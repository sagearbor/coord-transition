<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>پروتکل انتقال — Transition Protocol</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #c62828; --box-bg: #f9f9f9; --border: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, 'Segoe UI', Tahoma, sans-serif; line-height: 1.7; max-width: 640px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); }

        .lang-select { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
        .lang-select label { font-weight: bold; font-size: 0.9rem; }
        .lang-select select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; background: #fff; cursor: pointer; flex: 1; max-width: 260px; }

        h1 { color: var(--accent); margin-bottom: 8px; font-size: 1.6rem; }
        .subtitle { margin-bottom: 24px; color: #555; }

        .phase { background: var(--box-bg); border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
        [dir="rtl"] .phase { border-left: none; border-right: 4px solid var(--accent); border-radius: 8px 0 0 8px; }
        .phase h3 { margin-bottom: 6px; }
        .signal-box { background: #fff; border: 1px dashed #999; padding: 10px; margin-top: 10px; font-weight: bold; text-align: center; letter-spacing: 0.5px; }

        .safety { background: #fff8e1; border: 1px solid #ffe082; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .safety h3 { color: #f57f17; margin-bottom: 6px; }

        footer { margin-top: 40px; font-size: 0.8rem; color: #777; text-align: center; }
    </style>
</head>
<body>

    <div class="lang-select">
        <label id="lang-label">زبان:</label>
        <select id="lang-dropdown" onchange="setLang(this.value)">
            <option value="fa">فارسی (Persian)</option>
            <option value="az">آذربایجانی (Azerbaijani)</option>
            <option value="ku">کوردی (Kurdish)</option>
            <option value="ar">العربية (Arabic)</option>
            <option value="en">English</option>
        </select>
    </div>

    <div id="content"></div>

    <footer id="footer"></footer>

    <script>
        var T = {
            fa: {
                dir: 'rtl',
                langLabel: 'زبان:',
                title: 'پروتکل انتقال',
                subtitle: 'هماهنگی صلح‌آمیز محلی در زمان تغییر.',
                phase1Title: '۱. رأی خاموش',
                phase1Text: 'یک ملحفه سفید ساده (حداقل ۲ در ۲ متر) روی پشت‌بام یا حیاط پهن کنید، صاف روی زمین. این پیام شما را به صورت ایمن و ناشناس از طریق تصاویر ماهواره‌ای می‌رساند. نیازی به آویزان کردن از پنجره نیست.',
                phase1Signal: 'سیگنال: مربع سفید روی پشت‌بام',
                phase2Title: '۲. میدان شهر',
                phase2Text: 'وقتی ملحفه‌های سفید کافی در منطقه شما دیده شد، ظهر اولین جمعه، یک حلقه بزرگ انسانی در مرکز شهر تشکیل دهید. این نشان‌دهنده اجماع جمعی است.',
                phase2Signal: 'سیگنال: حلقه انسانی',
                phase3Title: '۳. انتقال امنیت',
                phase3Text: 'نیروهای امنیتی محلی (پلیس و ارتش): اگر با مردم هستید، یک علامت X از افراد در داخل حلقه تشکیل دهید. این نشان می‌دهد که امنیت محلی از انتقال صلح‌آمیز حمایت می‌کند.',
                phase3Signal: 'سیگنال: حلقه + X',
                safetyTitle: 'نکات ایمنی',
                safetyText: 'فاز ۱ ناشناس و کم‌خطر است. قبل از رفتن به فاز ۲، منتظر شواهد گسترده مشارکت باشید. هرگز به تنهایی اقدام نکنید — قدرت در تعداد است. ملحفه را صاف روی سطح بگذارید، آویزان نکنید.',
                footer: 'این سایت آفلاین کار می‌کند. از طریق بلوتوث، اس‌ام‌اس یا پرینت به اشتراک بگذارید.'
            },
            az: {
                dir: 'rtl',
                langLabel: 'دیل:',
                title: 'کئچید پروتوکولو',
                subtitle: 'دَییشیکلیک زامانی یئرلی سولح‌آمیز هماهنگلیک.',
                phase1Title: '۱. ساکیت سس',
                phase1Text: 'بیر ساده آغ ملحفه‌نی (ان آز ۲ در ۲ متر) داما یا حیاطا سرین، یئره دوز قویون. بو، سیزین مساژینیزی پئیک تصویرلری واسیطه‌سیله تحلوکه‌سیز و گیزلی شکیلده چاتدیرار.',
                phase1Signal: 'سیگنال: داما آغ مربع',
                phase2Title: '۲. شهر میدانی',
                phase2Text: 'بؤلگه‌نیزده کیفایت قدر آغ ملحفه گؤروندوکدن سونرا، ایلک جمعه گونو گونورتا، شهر مرکزینده بؤیوک بیر اینسان حلقه‌سی یارادین.',
                phase2Signal: 'سیگنال: اینسان حلقه‌سی',
                phase3Title: '۳. تحلوکه‌سیزلیک کئچیدی',
                phase3Text: 'یئرلی تحلوکه‌سیزلیک قوولاری: اگر خالقلا بیرسینیزسه، حلقه‌نین ایچینده X شکلی یارادین.',
                phase3Signal: 'سیگنال: حلقه + X',
                safetyTitle: 'تحلوکه‌سیزلیک',
                safetyText: 'فاز ۱ گیزلی و آز ریسکلیدیر. فاز ۲-یه کئچمزدن اؤنجه گئنیش ایشتیراک سوبوتلارینی گؤزله‌یین. هئچ واخت تک باشینا حرکت ائتمه‌یین.',
                footer: 'بو سایت آفلاین ایشله‌ییر. بلوتوث، اس‌ام‌اس و یا چاپ واسیطه‌سیله پایلاشین.'
            },
            ku: {
                dir: 'rtl',
                langLabel: 'زمان:',
                title: 'پڕۆتۆکۆلی گواستنەوە',
                subtitle: 'هاوئاهەنگی ئاشتیخوازانەی ناوخۆیی لە کاتی گۆڕانکاریدا.',
                phase1Title: '١. دەنگی بێدەنگ',
                phase1Text: 'جێگایەکی سپی ئاسایی (لانیکەم ٢ لە ٢ مەتر) لەسەر بانی خانوو یان حەوشە ڕابخە، تەختی لەسەر زەوی. ئەم سیگنالە بە شێوەیەکی پارێزراو و نەناسراو لە ڕێگەی وێنەی سەتەلایتەوە دەگەیەنرێت.',
                phase1Signal: 'سیگنال: چوارگۆشەی سپی لەسەر بان',
                phase2Title: '٢. مەیدانی شار',
                phase2Text: 'کاتێک جێگای سپی پێویست لە ناوچەکەتدا بینرا، نیوەڕۆی یەکەم ھەینی، بازنەیەکی گەورەی مرۆڤی لە ناوەندی شار دروست بکە.',
                phase2Signal: 'سیگنال: بازنەی مرۆڤی',
                phase3Title: '٣. گواستنەوەی ئاسایش',
                phase3Text: 'هێزە ئاسایشیەکانی ناوخۆ: ئەگەر لەگەڵ خەڵکدا وەستاون، شێوەی X لەناو بازنەکەدا دروست بکەن.',
                phase3Signal: 'سیگنال: بازنە + X',
                safetyTitle: 'ئاسایش',
                safetyText: 'قۆناغی ١ نەناسراو و کەم مەترسییە. پێش چوونە قۆناغی ٢، چاوەڕوانی بەڵگەی بەشداریی بەرفراوان بکە. هەرگیز بە تەنها مەکە — هێز لە ژمارەدایە.',
                footer: 'ئەم ماڵپەڕە بەبێ ئینتەرنێت کار دەکات. لە ڕێگەی بلوتوس، نامەی کورت یان چاپکردنەوە ببەخشە.'
            },
            ar: {
                dir: 'rtl',
                langLabel: 'اللغة:',
                title: 'بروتوكول الانتقال',
                subtitle: 'تنسيق محلي سلمي في أوقات التغيير.',
                phase1Title: '١. التصويت الصامت',
                phase1Text: 'ضع ملاءة بيضاء بسيطة (٢ × ٢ متر على الأقل) على السطح أو في الفناء، مسطّحة على الأرض. هذا يوصل رسالتك بأمان وبشكل مجهول عبر صور الأقمار الصناعية. لا حاجة للتعليق من النافذة.',
                phase1Signal: 'الإشارة: مربع أبيض على السطح',
                phase2Title: '٢. ساحة المدينة',
                phase2Text: 'عندما تُرى ملاءات بيضاء كافية في منطقتك، شكّلوا حلقة بشرية كبيرة في وسط المدينة ظهر أول جمعة.',
                phase2Signal: 'الإشارة: حلقة بشرية',
                phase3Title: '٣. انتقال الأمن',
                phase3Text: 'قوات الأمن المحلية: إذا كنتم مع الشعب، شكّلوا علامة X داخل الحلقة.',
                phase3Signal: 'الإشارة: حلقة + X',
                safetyTitle: 'ملاحظات السلامة',
                safetyText: 'المرحلة ١ مجهولة وقليلة المخاطر. انتظروا دليلاً على مشاركة واسعة قبل الانتقال للمرحلة ٢. لا تتصرفوا بمفردكم أبداً — القوة في العدد.',
                footer: 'يعمل هذا الموقع بدون إنترنت. شاركه عبر البلوتوث أو الرسائل القصيرة أو الطباعة.'
            },
            en: {
                dir: 'ltr',
                langLabel: 'Language:',
                title: 'Transition Protocol',
                subtitle: 'Peaceful local coordination during times of change.',
                phase1Title: '1. The Silent Vote',
                phase1Text: 'Lay a plain white sheet (at least 2m x 2m) flat on your rooftop or courtyard. This signals your intent safely and anonymously via satellite imagery. No need to hang from windows.',
                phase1Signal: 'SIGNAL: WHITE SQUARE ON ROOFTOP',
                phase2Title: '2. The Town Square',
                phase2Text: 'When enough white sheets are seen in your area, form a large human circle in the town center at High Noon on the first Friday.',
                phase2Signal: 'SIGNAL: HUMAN CIRCLE',
                phase3Title: '3. Security Transition',
                phase3Text: 'Local security forces (police and military): If you stand with the people, form an X of people inside the circle. This shows local security supports a peaceful transition.',
                phase3Signal: 'SIGNAL: CIRCLE + X',
                safetyTitle: 'Safety Notes',
                safetyText: 'Phase 1 is anonymous and low-risk. Wait for evidence of widespread participation before moving to Phase 2. Never act alone — strength is in numbers. Lay the sheet flat on a surface, do not hang it.',
                footer: 'This site works offline. Share via Bluetooth, SMS, or print.'
            }
        };

        function el(tag, className, text) {
            var e = document.createElement(tag);
            if (className) e.className = className;
            if (text) e.textContent = text;
            return e;
        }

        function makePhase(title, text, signal) {
            var div = el('div', 'phase');
            div.appendChild(el('h3', '', title));
            div.appendChild(el('p', '', text));
            div.appendChild(el('div', 'signal-box', signal));
            return div;
        }

        function setLang(lang) {
            var t = T[lang];
            if (!t) return;

            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;

            document.getElementById('lang-label').textContent = t.langLabel;

            var content = document.getElementById('content');
            content.textContent = '';

            content.appendChild(el('h1', '', t.title));
            content.appendChild(el('p', 'subtitle', t.subtitle));
            content.appendChild(makePhase(t.phase1Title, t.phase1Text, t.phase1Signal));
            content.appendChild(makePhase(t.phase2Title, t.phase2Text, t.phase2Signal));
            content.appendChild(makePhase(t.phase3Title, t.phase3Text, t.phase3Signal));

            var safety = el('div', 'safety');
            safety.appendChild(el('h3', '', t.safetyTitle));
            safety.appendChild(el('p', '', t.safetyText));
            content.appendChild(safety);

            document.getElementById('footer').textContent = t.footer;

            localStorage.setItem('lang', lang);
        }

        (function() {
            var saved = localStorage.getItem('lang') || 'fa';
            document.getElementById('lang-dropdown').value = saved;
            setLang(saved);

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js');
                });
            }
        })();
    </script>
</body>
</html>
