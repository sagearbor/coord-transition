<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>پروتکل انتقال ایران — Iran Transition Protocol</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #c62828; --box-bg: #f9f9f9; --border: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, 'Segoe UI', Tahoma, sans-serif; line-height: 1.7; max-width: 640px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); }

        .lang-select { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .lang-select label { font-weight: bold; font-size: 0.9rem; }
        .lang-select select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; background: #fff; cursor: pointer; flex: 1; max-width: 260px; }

        h1 { color: var(--accent); margin-bottom: 4px; font-size: 1.5rem; }
        .subtitle { margin-bottom: 16px; color: #555; }

        .timeline-banner { background: #e3f2fd; border: 2px solid #1565c0; padding: 12px; margin-bottom: 18px; border-radius: 8px; text-align: center; }
        .timeline-banner .tl-title { font-weight: bold; color: #0d47a1; margin-bottom: 4px; }
        .timeline-banner .tl-detail { font-size: 0.9rem; color: #1565c0; }

        .date-box { background: #e3f2fd; border: 2px solid #1565c0; padding: 10px; margin-top: 10px; border-radius: 8px; text-align: center; }
        .date-box .date-label { font-size: 0.8rem; color: #1565c0; font-weight: bold; margin-bottom: 2px; }
        .date-box .date-value { font-size: 1.2rem; font-weight: bold; color: #0d47a1; }
        .date-box.pending { background: #fff3e0; border-color: #e65100; }
        .date-box.pending .date-label { color: #e65100; }
        .date-box.pending .date-value { color: #bf360c; font-size: 1rem; }

        .phase { background: var(--box-bg); border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 14px; border-radius: 0 8px 8px 0; }
        [dir="rtl"] .phase { border-left: none; border-right: 4px solid var(--accent); border-radius: 8px 0 0 8px; }
        .phase h3 { margin-bottom: 4px; font-size: 1rem; }
        .phase p { font-size: 0.92rem; }
        .signal-box { background: #fff; border: 1px dashed #999; padding: 8px; margin-top: 8px; font-weight: bold; text-align: center; font-size: 0.9rem; }

        .safety { background: #fff8e1; border: 1px solid #ffe082; padding: 12px; margin-bottom: 14px; border-radius: 8px; }
        .safety h3 { color: #f57f17; margin-bottom: 4px; font-size: 1rem; }
        .safety p { font-size: 0.92rem; }

        footer { margin-top: 20px; font-size: 0.78rem; color: #777; text-align: center; }

        @media print {
            .lang-select { display: none; }
            body { max-width: 100%; padding: 8px; font-size: 10pt; line-height: 1.35; }
            h1 { font-size: 14pt; margin-bottom: 2px; }
            .subtitle { margin-bottom: 8px; font-size: 9pt; }
            .timeline-banner { padding: 6px; margin-bottom: 8px; }
            .timeline-banner .tl-title { font-size: 10pt; }
            .timeline-banner .tl-detail { font-size: 8pt; }
            .phase { padding: 6px; margin-bottom: 6px; break-inside: avoid; }
            .phase h3 { font-size: 10pt; margin-bottom: 2px; }
            .phase p { font-size: 9pt; }
            .signal-box { padding: 4px; margin-top: 4px; font-size: 9pt; }
            .date-box { padding: 4px; margin-top: 4px; }
            .date-box .date-label { font-size: 7pt; }
            .date-box .date-value { font-size: 10pt; }
            .date-box.pending { border-style: dashed; }
            .safety { padding: 6px; margin-bottom: 6px; break-inside: avoid; }
            .safety h3 { font-size: 10pt; }
            .safety p { font-size: 9pt; }
            footer { margin-top: 8px; font-size: 7pt; }
        }
    </style>
</head>
<body>

    <div class="lang-select">
        <label id="lang-label">زبان:</label>
        <select id="lang-dropdown" onchange="setLang(this.value)">
            <option value="fa">فارسی (Persian)</option>
            <option value="az">آذربایجانی (Azerbaijani)</option>
            <option value="ku">کوردی (Kurdish)</option>
            <option value="ar">العربية (Arabic)</option>
            <option value="en">English</option>
        </select>
    </div>

    <div id="content"></div>

    <footer id="footer"></footer>

    <script>
        // ============================================================
        // EDIT THESE TO SET THE GO-TIMES. Leave empty string '' for
        // "to be announced". Use Iran Standard Time (IRST, UTC+3:30).
        // Format: any readable string, e.g. '25 March 2026, 06:00 IRST'
        // When set, the date boxes turn blue. Until then, orange "TBA".
        // ============================================================
        var PHASE1_DATE = '';   // e.g. '۲۵ فروردین ۱۴۰۵ — ساعت ۶ صبح'
        var PHASE2_DATE = '';   // e.g. '۱ اردیبهشت ۱۴۰۵ — ظهر'

        var T = {
            fa: {
                dir: 'rtl',
                langLabel: 'زبان:',
                title: 'پروتکل انتقال ایران',
                subtitle: 'سرشماری صلح‌آمیز و ناشناس برای همه مردم ایران.',
                tlTitle: 'فاز ۱: اواخر فروردین ۱۴۰۵ (~اواخر مارس ۲۰۲۶). فاز ۲: سه هفته بعد.',
                tlDetail: 'فاصله ۳ هفته‌ای برای انتشار تصاویر ماهواره‌ای (Planet Labs با ۱۴ روز تأخیر). تاریخ دقیق در همین صفحه اعلام می‌شود.',
                phase1Title: '۱. رأی خاموش (سرشماری)',
                phase1Desc: 'تاریخ اعلام‌شده، یا اولین روز صاف در ۳ روز بعد:',
                phase1Text: 'خواهان تغییر: ظهر تا ۱۲:۳۰ وقت تهران. حامی حکومت فعلی: ۱۳:۰۰ تا ۱۳:۳۰. هر پارچه بزرگ (ملحفه، پتو، فرش — حداقل ۲×۲ متر) را در فضای باز دور از خانه روی زمین بگذارید و کنارش بایستید. حداقل ۳ متر فاصله. هر نفر یک پارچه. بعد جمع کنید و بروید.',
                phase1Signal: 'ظهر–۱۲:۳۰ = تغییر | ۱۳:۰۰–۱۳:۳۰ = حکومت فعلی',
                phase1DateLabel: 'تاریخ فاز ۱:',
                phase1Pending: 'به‌زودی اعلام می‌شود',
                phase2Title: '۲. میدان شهر + انتقال امنیت',
                phase2Desc: 'فقط اگر در منطقه شما: مشارکت بالای ۲۵٪ جمعیت و بیش از ۶۰٪ خواهان تغییر بودند.',
                phase2Text: 'پس از انتشار نتایج ماهواره‌ای، حلقه انسانی در میدان اصلی شهر. نیروهای امنیتی محلی: اگر با مردم هستید، علامت X در داخل حلقه.',
                phase2Signal: 'حلقه = مردم | حلقه + X = مردم + نیروهای امنیتی',
                phase2DateLabel: 'تاریخ فاز ۲:',
                phase2Pending: 'سه هفته پس از فاز ۱',
                safetyTitle: 'ایمنی',
                safetyText: 'فاز ۱ سرشماری هر دو طرف است. فضای باز دور از خانه. ۳ متر فاصله. فعلاً فقط این صفحه را به اشتراک بگذارید.',
                footer: 'آفلاین کار می‌کند. ذخیره و به اشتراک بگذارید.'
            },
            az: {
                dir: 'rtl',
                langLabel: 'دیل:',
                title: 'ایران کئچید پروتوکولو',
                subtitle: 'بوتون ایران خالقی اوچون سولح‌آمیز و ناشناس سرشماری.',
                tlTitle: 'فاز ۱: فروردین ۱۴۰۵ سونلاری (~مارس ۲۰۲۶ سونلاری). فاز ۲: اوچ هفته سونرا.',
                tlDetail: '۳ هفته‌لیک فاصله پئیک تصویرلرینین یایینلانماسی اوچوندور (Planet Labs ۱۴ گون گئجیکمه). دقیق تاریخ بو صحیفه‌ده اعلان اولوناجاق.',
                phase1Title: '۱. ساکیت سس (سرشماری)',
                phase1Desc: 'اعلان اولونان تاریخ، یا ۳ گون ایچینده ایلک آچیق گون:',
                phase1Text: 'دَییشیکلیک ایسته‌ینلر: ۱۲:۰۰–۱۲:۳۰ تهران واختی. ایندیکی حؤکومت: ۱۳:۰۰–۱۳:۳۰. هر بؤیوک پارچانی (ملحفه، یورغان، خالچا — ان آز ۲×۲ متر) ائودن اوزاق آچیق یئرده یئره سرین و یانیندا دورون. ان آز ۳ متر فاصله. هر آدام بیر پارچا. سونرا یغین و گئدین.',
                phase1Signal: '۱۲:۰۰–۱۲:۳۰ = دَییشیکلیک | ۱۳:۰۰–۱۳:۳۰ = ایندیکی حؤکومت',
                phase1DateLabel: 'فاز ۱ تاریخی:',
                phase1Pending: 'تزلیکله اعلان اولوناجاق',
                phase2Title: '۲. شهر میدانی + امنیت کئچیدی',
                phase2Desc: 'یالنیز اگر بؤلگه‌نیزده: ایشتیراک ۲۵٪-دن چوخ و ۶۰٪-دن چوخو دَییشیکلیک ایسته‌دی.',
                phase2Text: 'پئیک نتیجه‌لری یایینلاناندان سونرا، شهر میدانیندا اینسان حلقه‌سی. یئرلی امنیت قوولاری: خالقلا بیرسینیزسه، حلقه ایچینده X یارادین.',
                phase2Signal: 'حلقه = خالق | حلقه + X = خالق + امنیت قوولاری',
                phase2DateLabel: 'فاز ۲ تاریخی:',
                phase2Pending: 'فاز ۱-دن اوچ هفته سونرا',
                safetyTitle: 'تحلوکه‌سیزلیک',
                safetyText: 'فاز ۱ هر ایکی طرف اوچون سرشماریدیر. ائودن اوزاق آچیق یئر. ۳ متر فاصله. هله‌لیک یالنیز بو صحیفه‌نی پایلاشین.',
                footer: 'آفلاین ایشله‌ییر. ساخلایین و پایلاشین.'
            },
            ku: {
                dir: 'rtl',
                langLabel: 'زمان:',
                title: 'پڕۆتۆکۆلی گواستنەوەی ئێران',
                subtitle: 'سەرژمێریەکی ئاشتیخوازانە و نەناسراو بۆ هەموو گەلی ئێران.',
                tlTitle: 'قۆناغی ١: کۆتایی فەرواردینی ١٤٠٥ (~کۆتایی مارسی ٢٠٢٦). قۆناغی ٢: سێ هەفتە دواتر.',
                tlDetail: 'فاصلەی ٣ هەفتەیی بۆ بڵاوبوونەوەی وێنەی سەتەلایتە (Planet Labs بە ١٤ ڕۆژ دواکەوتن). ڕێکەوت لە هەمان پەڕەدا ڕادەگەیەنرێت.',
                phase1Title: '١. دەنگی بێدەنگ (سەرژمێری)',
                phase1Desc: 'ڕێکەوتی ڕاگەیەندراو، یان یەکەم ڕۆژی ئاسمان ڕوون لە ٣ ڕۆژدا:',
                phase1Text: 'گۆڕانکاری: ١٢:٠٠–١٢:٣٠ کاتی تاران. حکومەتی ئێستا: ١٣:٠٠–١٣:٣٠. هەر پارچەیەکی گەورە (جێگا، بەتانی، فەرش — لانیکەم ٢×٢ مەتر) لە شوێنی کراوە دوور لە ماڵ دابنێ و لەتەنیشتیدا ڕاوەستە. لانیکەم ٣ مەتر فاصلە. هەر کەسێک یەک پارچە. دواتر کۆیبکەرەوە و بڕۆ.',
                phase1Signal: '١٢:٠٠–١٢:٣٠ = گۆڕانکاری | ١٣:٠٠–١٣:٣٠ = حکومەتی ئێستا',
                phase1DateLabel: 'ڕێکەوتی قۆناغی ١:',
                phase1Pending: 'بەم زووانە ڕادەگەیەنرێت',
                phase2Title: '٢. مەیدانی شار + گواستنەوەی ئاسایش',
                phase2Desc: 'تەنها ئەگەر لە ناوچەکەت: بەشداری زیاتر لە ٢٥٪ و زیاتر لە ٦٠٪ خوازیاری گۆڕانکاری بوون.',
                phase2Text: 'دوای بڵاوبوونەوەی ئەنجامەکان، بازنەی مرۆڤی لە مەیدانی شار. هێزی ئاسایشی ناوخۆ: لەگەڵ خەڵکدا وەستاون؟ شێوەی X لەناو بازنەکەدا.',
                phase2Signal: 'بازنە = خەڵک | بازنە + X = خەڵک + ئاسایش',
                phase2DateLabel: 'ڕێکەوتی قۆناغی ٢:',
                phase2Pending: 'سێ هەفتە دوای قۆناغی ١',
                safetyTitle: 'ئاسایش',
                safetyText: 'قۆناغی ١ سەرژمێرییە بۆ هەردوو لایەن. شوێنی کراوە دوور لە ماڵ. ٣ مەتر فاصلە. ئێستا تەنها ئەم پەڕەیە بڵاوبکەرەوە.',
                footer: 'بەبێ ئینتەرنێت کار دەکات. هەڵیبگرە و بیبەخشە.'
            },
            ar: {
                dir: 'rtl',
                langLabel: 'اللغة:',
                title: 'بروتوكول انتقال إيران',
                subtitle: 'إحصاء سلمي ومجهول لجميع شعب إيران.',
                tlTitle: 'المرحلة ١: أواخر فروردين ١٤٠٥ (~أواخر مارس ٢٠٢٦). المرحلة ٢: بعد ٣ أسابيع.',
                tlDetail: 'الفاصل ٣ أسابيع لنشر صور الأقمار الصناعية (Planet Labs بتأخير ١٤ يوماً). التاريخ الدقيق في هذه الصفحة.',
                phase1Title: '١. التصويت الصامت (إحصاء)',
                phase1Desc: 'التاريخ المعلن، أو أول يوم صافٍ خلال ٣ أيام:',
                phase1Text: 'التغيير: الظهر–١٢:٣٠ بتوقيت طهران. الحكومة الحالية: ١٣:٠٠–١٣:٣٠. أي قماش كبير (ملاءة، بطانية، سجادة — ٢×٢ متر على الأقل) على الأرض في مكان مفتوح بعيداً عن المنازل وقفوا بجانبه. مسافة ٣ أمتار. كل شخص قطعة. بعدها اجمعوها وانصرفوا.',
                phase1Signal: 'الظهر–١٢:٣٠ = تغيير | ١٣:٠٠–١٣:٣٠ = الحكومة الحالية',
                phase1DateLabel: 'موعد المرحلة ١:',
                phase1Pending: 'سيُعلن قريباً',
                phase2Title: '٢. ساحة المدينة + انتقال الأمن',
                phase2Desc: 'فقط إذا في منطقتكم: مشاركة أكثر من ٢٥٪ وأكثر من ٦٠٪ مؤيدو التغيير.',
                phase2Text: 'بعد نشر نتائج الأقمار الصناعية، حلقة بشرية في الساحة الرئيسية. قوات الأمن المحلية: مع الشعب؟ شكّلوا X داخل الحلقة.',
                phase2Signal: 'حلقة = شعب | حلقة + X = شعب + أمن',
                phase2DateLabel: 'موعد المرحلة ٢:',
                phase2Pending: 'بعد ٣ أسابيع من المرحلة ١',
                safetyTitle: 'السلامة',
                safetyText: 'المرحلة ١ إحصاء لكلا الطرفين. مكان مفتوح بعيداً عن المنازل. ٣ أمتار. حالياً فقط شاركوا هذه الصفحة.',
                footer: 'يعمل بدون إنترنت. احفظوه وشاركوه.'
            },
            en: {
                dir: 'ltr',
                langLabel: 'Language:',
                title: 'Iran Transition Protocol',
                subtitle: 'A peaceful, anonymous census for all the people of Iran.',
                tlTitle: 'Phase 1: late Farvardin 1405 (~late March 2026). Phase 2: three weeks later.',
                tlDetail: '3-week gap allows satellite imagery release (Planet Labs has 14-day delay). Exact date announced on this page.',
                phase1Title: '1. The Silent Vote (Census)',
                phase1Desc: 'Announced date, or first clear day within 3 days:',
                phase1Text: 'For change: noon–12:30 Tehran time. For current government: 1:00–1:30. Any large fabric (sheet, blanket, rug — at least 2m x 2m) flat on the ground in an open area away from homes. Stand beside it. At least 3 meters apart. One person, one fabric. When done, pick up and leave.',
                phase1Signal: 'NOON–12:30 = CHANGE | 1:00–1:30 = CURRENT GOV.',
                phase1DateLabel: 'Phase 1 date:',
                phase1Pending: 'To be announced soon',
                phase2Title: '2. Town Square + Security Transition',
                phase2Desc: 'Only if in your area: turnout exceeded 25% AND over 60% were for change.',
                phase2Text: 'After satellite results are published, form a human circle in the main square. Local security forces: if you stand with the people, form an X inside the circle.',
                phase2Signal: 'CIRCLE = PEOPLE | CIRCLE + X = PEOPLE + SECURITY',
                phase2DateLabel: 'Phase 2 date:',
                phase2Pending: 'Three weeks after Phase 1',
                safetyTitle: 'Safety',
                safetyText: 'Phase 1 is a census for both sides. Open area away from home. 3 meters apart. For now, just share this page.',
                footer: 'Works offline. Save and share.'
            }
        };

        function el(tag, className, text) {
            var e = document.createElement(tag);
            if (className) e.className = className;
            if (text) e.textContent = text;
            return e;
        }

        function makeDateBox(label, pending, dateValue) {
            var isPending = !dateValue;
            var box = el('div', 'date-box' + (isPending ? ' pending' : ''));
            box.appendChild(el('div', 'date-label', label));
            box.appendChild(el('div', 'date-value', isPending ? pending : dateValue));
            return box;
        }

        function makePhase(title, desc, text, signal, dateLabel, datePending, dateValue) {
            var div = el('div', 'phase');
            div.appendChild(el('h3', '', title));
            if (desc) {
                var d = el('p', '', desc);
                d.style.fontWeight = 'bold';
                d.style.fontStyle = 'italic';
                d.style.marginBottom = '4px';
                d.style.fontSize = '0.88rem';
                div.appendChild(d);
            }
            div.appendChild(el('p', '', text));
            div.appendChild(el('div', 'signal-box', signal));
            if (dateLabel) {
                div.appendChild(makeDateBox(dateLabel, datePending, dateValue));
            }
            return div;
        }

        function setLang(lang) {
            var t = T[lang];
            if (!t) return;

            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;

            document.getElementById('lang-label').textContent = t.langLabel;

            var content = document.getElementById('content');
            content.textContent = '';

            content.appendChild(el('h1', '', t.title));
            content.appendChild(el('p', 'subtitle', t.subtitle));

            var banner = el('div', 'timeline-banner');
            banner.appendChild(el('div', 'tl-title', t.tlTitle));
            banner.appendChild(el('div', 'tl-detail', t.tlDetail));
            content.appendChild(banner);

            content.appendChild(makePhase(t.phase1Title, t.phase1Desc, t.phase1Text, t.phase1Signal, t.phase1DateLabel, t.phase1Pending, PHASE1_DATE));
            content.appendChild(makePhase(t.phase2Title, t.phase2Desc, t.phase2Text, t.phase2Signal, t.phase2DateLabel, t.phase2Pending, PHASE2_DATE));

            var safety = el('div', 'safety');
            safety.appendChild(el('h3', '', t.safetyTitle));
            safety.appendChild(el('p', '', t.safetyText));
            content.appendChild(safety);

            document.getElementById('footer').textContent = t.footer;

            localStorage.setItem('lang', lang);
        }

        (function() {
            var saved = localStorage.getItem('lang') || 'fa';
            document.getElementById('lang-dropdown').value = saved;
            setLang(saved);

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js');
                });
            }
        })();
    </script>
</body>
</html>
