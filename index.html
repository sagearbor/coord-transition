<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>پروتکل انتقال ایران — Iran Transition Protocol</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #c62828; --box-bg: #f9f9f9; --border: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, 'Segoe UI', Tahoma, sans-serif; line-height: 1.7; max-width: 640px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); }

        .lang-select { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .lang-select label { font-weight: bold; font-size: 0.9rem; }
        .lang-select select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; background: #fff; cursor: pointer; flex: 1; max-width: 260px; }

        h1 { color: var(--accent); margin-bottom: 4px; font-size: 1.5rem; }
        .subtitle { margin-bottom: 16px; color: #555; }

        .timeline-banner { background: #e3f2fd; border: 2px solid #1565c0; padding: 12px; margin-bottom: 18px; border-radius: 8px; text-align: center; }
        .timeline-banner .tl-title { font-weight: bold; color: #0d47a1; margin-bottom: 4px; }
        .timeline-banner .tl-detail { font-size: 0.9rem; color: #1565c0; }

        .date-box { background: #e3f2fd; border: 2px solid #1565c0; padding: 10px; margin-top: 10px; border-radius: 8px; text-align: center; }
        .date-box .date-label { font-size: 0.8rem; color: #1565c0; font-weight: bold; margin-bottom: 2px; }
        .date-box .date-value { font-size: 1.2rem; font-weight: bold; color: #0d47a1; }
        .date-box.pending { background: #fff3e0; border-color: #e65100; }
        .date-box.pending .date-label { color: #e65100; }
        .date-box.pending .date-value { color: #bf360c; font-size: 1rem; }

        .phase { background: var(--box-bg); border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 14px; border-radius: 0 8px 8px 0; }
        [dir="rtl"] .phase { border-left: none; border-right: 4px solid var(--accent); border-radius: 8px 0 0 8px; }
        .phase h3 { margin-bottom: 4px; font-size: 1rem; }
        .phase p { font-size: 0.92rem; }
        .signal-box { background: #fff; border: 1px dashed #999; padding: 8px; margin-top: 8px; font-weight: bold; text-align: center; font-size: 0.9rem; }

        .safety { background: #fff8e1; border: 1px solid #ffe082; padding: 12px; margin-bottom: 14px; border-radius: 8px; }
        .safety h3 { color: #f57f17; margin-bottom: 4px; font-size: 1rem; }
        .safety p { font-size: 0.92rem; }

        footer { margin-top: 20px; font-size: 0.78rem; color: #777; text-align: center; }

        @media print {
            .lang-select { display: none; }
            body { max-width: 100%; padding: 8px; font-size: 10pt; line-height: 1.35; }
            h1 { font-size: 14pt; margin-bottom: 2px; }
            .subtitle { margin-bottom: 8px; font-size: 9pt; }
            .timeline-banner { padding: 6px; margin-bottom: 8px; }
            .timeline-banner .tl-title { font-size: 10pt; }
            .timeline-banner .tl-detail { font-size: 8pt; }
            .phase { padding: 6px; margin-bottom: 6px; break-inside: avoid; }
            .phase h3 { font-size: 10pt; margin-bottom: 2px; }
            .phase p { font-size: 9pt; }
            .signal-box { padding: 4px; margin-top: 4px; font-size: 9pt; }
            .date-box { padding: 4px; margin-top: 4px; }
            .date-box .date-label { font-size: 7pt; }
            .date-box .date-value { font-size: 10pt; }
            .date-box.pending { border-style: dashed; }
            .safety { padding: 6px; margin-bottom: 6px; break-inside: avoid; }
            .safety h3 { font-size: 10pt; }
            .safety p { font-size: 9pt; }
            footer { margin-top: 8px; font-size: 7pt; }
        }
    </style>
</head>

            en: {
                dir: 'ltr',
                langLabel: 'Language:',

        function el(tag, className, text) {
            var e = document.createElement(tag);
            if (className) e.className = className;
            if (text) e.textContent = text;
            return e;
        }

        function makeDateBox(label, pending, dateValue) {
            var isPending = !dateValue;
            var box = el('div', 'date-box' + (isPending ? ' pending' : ''));
            box.appendChild(el('div', 'date-label', label));
            box.appendChild(el('div', 'date-value', isPending ? pending : dateValue));
            return box;
        }

        function makePhase(title, desc, text, signal, dateLabel, datePending, dateValue) {
            var div = el('div', 'phase');
            div.appendChild(el('h3', '', title));
            if (desc) {
                var d = el('p', '', desc);
                d.style.fontWeight = 'bold';
                d.style.fontStyle = 'italic';
                d.style.marginBottom = '4px';
                d.style.fontSize = '0.88rem';
                div.appendChild(d);
            }
            div.appendChild(el('p', '', text));
            div.appendChild(el('div', 'signal-box', signal));
            if (dateLabel) {
                div.appendChild(makeDateBox(dateLabel, datePending, dateValue));
            }
            return div;
        }

        function setLang(lang) {
            var t = T[lang];
            if (!t) return;

            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;

            document.getElementById('lang-label').textContent = t.langLabel;

            var content = document.getElementById('content');
            content.textContent = '';

            content.appendChild(el('h1', '', t.title));
            content.appendChild(el('p', 'subtitle', t.subtitle));

            var banner = el('div', 'timeline-banner');
            banner.appendChild(el('div', 'tl-title', t.tlTitle));
            banner.appendChild(el('div', 'tl-detail', t.tlDetail));
            content.appendChild(banner);

            content.appendChild(makePhase(t.phase1Title, t.phase1Desc, t.phase1Text, t.phase1Signal, t.phase1DateLabel, t.phase1Pending, PHASE1_DATE));
            content.appendChild(makePhase(t.phase2Title, t.phase2Desc, t.phase2Text, t.phase2Signal, t.phase2DateLabel, t.phase2Pending, PHASE2_DATE));
            content.appendChild(makePhase(t.phase3Title, null, t.phase3Text, t.phase3Signal));

            var safety = el('div', 'safety');
            safety.appendChild(el('h3', '', t.safetyTitle));
            safety.appendChild(el('p', '', t.safetyText));
            content.appendChild(safety);

            document.getElementById('footer').textContent = t.footer;

            localStorage.setItem('lang', lang);
        }

        (function() {
            var saved = localStorage.getItem('lang') || 'fa';
            document.getElementById('lang-dropdown').value = saved;
            setLang(saved);

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js');
                });
            }
        })();
    </script>
